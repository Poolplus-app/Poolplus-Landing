<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>PoolPlus — Client Sign In</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@2.47.0/dist/tabler-icons.min.css" />
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    background: #0a1628;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 2rem 1.25rem;
  }
  .wrap { width: 100%; max-width: 380px; }
  .lang-toggle {
    display: flex;
    justify-content: flex-end;
    gap: 6px;
    margin-bottom: 1.5rem;
  }
  .lang-btn {
    display: flex;
    align-items: center;
    gap: 6px;
    background: #ffffff0a;
    border: 0.5px solid #ffffff1a;
    border-radius: 20px;
    padding: 5px 12px;
    font-size: 12px;
    color: #7a9cc0;
    cursor: pointer;
    transition: all .15s;
  }
  .lang-btn.active {
    background: #1a73e818;
    border-color: #1a73e860;
    color: #6cb2ff;
  }
  .header { text-align: center; margin-bottom: 2rem; }
  .logo {
    width: 56px; height: 56px;
    background: linear-gradient(135deg, #1a73e8, #0d47a1);
    border-radius: 16px;
    display: flex; align-items: center; justify-content: center;
    margin: 0 auto 1rem;
    font-size: 26px;
  }
  .header h1 { color: #fff; font-size: 22px; font-weight: 700; margin-bottom: 4px; }
  .header p { color: #7a9cc0; font-size: 14px; }
  .card {
    background: #ffffff08;
    border: 0.5px solid #ffffff18;
    border-radius: 18px;
    padding: 1.75rem;
  }
  .auth-btn {
    width: 100%;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 10px;
    padding: 13px;
    border-radius: 12px;
    font-size: 14px;
    font-weight: 600;
    cursor: pointer;
    border: none;
    margin-bottom: 12px;
    transition: opacity .15s;
  }
  .auth-btn:hover { opacity: 0.88; }
  .btn-google { background: #fff; color: #1f1f1f; }
  .btn-apple { background: #000; color: #fff; }
  .btn-google img, .btn-apple i { font-size: 18px; }
  .divider {
    display: flex; align-items: center; gap: 10px;
    color: #4d6788; font-size: 12px;
    margin: 1.25rem 0;
  }
  .divider::before, .divider::after {
    content: ''; flex: 1; height: 1px; background: #ffffff14;
  }
  .magic-input {
    width: 100%;
    background: #ffffff08;
    border: 1px solid #ffffff20;
    border-radius: 12px;
    padding: 13px 14px;
    color: #fff;
    font-size: 14px;
    margin-bottom: 12px;
    outline: none;
  }
  .magic-input::placeholder { color: #5a7596; }
  .magic-input:focus { border-color: #1a73e8; }
  .btn-magic {
    width: 100%;
    background: #1a73e8;
    color: #fff;
    border: none;
    border-radius: 12px;
    padding: 13px;
    font-size: 14px;
    font-weight: 600;
    cursor: pointer;
  }
  .btn-magic:hover { background: #1864c4; }
  .msg {
    display: none;
    text-align: center;
    font-size: 13px;
    margin-top: 14px;
    padding: 10px;
    border-radius: 10px;
  }
  .footer-note {
    text-align: center;
    color: #4d6788;
    font-size: 12px;
    margin-top: 1.5rem;
    line-height: 1.6;
  }
  .footer-note a { color: #6cb2ff; text-decoration: none; }
</style>
</head>
<body>
<div class="wrap">

  <div class="lang-toggle">
    <button class="lang-btn active" id="lang-en" onclick="setLang('en')">🇺🇸 EN</button>
    <button class="lang-btn" id="lang-es" onclick="setLang('es')">🇪🇸 ES</button>
  </div>

  <div class="header">
    <div class="logo">🏊</div>
    <h1 id="t-title">Welcome to PoolPlus</h1>
    <p id="t-subtitle">Sign in to manage your pool service</p>
  </div>

  <div class="card">
    <button class="auth-btn btn-google" onclick="authWith('google')">
      <img src="https://www.gstatic.com/images/branding/product/1x/gsa_512dp.png" width="18" height="18" alt="" />
      <span id="t-google">Continue with Google</span>
    </button>
    <button class="auth-btn btn-apple" onclick="authWith('apple')">
      <i class="ti ti-brand-apple" aria-hidden="true"></i>
      <span id="t-apple">Continue with Apple</span>
    </button>

    <div class="divider"><span id="t-or">or</span></div>

    <input type="email" class="magic-input" id="magic-email" placeholder="you@email.com" />
    <button class="btn-magic" onclick="sendMagicLink()" id="t-magic-btn">Send magic link</button>

    <div class="msg" id="status-msg"></div>
  </div>

  <p class="footer-note" id="t-terms">
    By continuing, you agree to PoolPlus's <a href="#">Terms</a> and <a href="#">Privacy Policy</a>.
  </p>
</div>

<script>
const translations = {
  en: {
    title: "Welcome to PoolPlus",
    subtitle: "Sign in to manage your pool service",
    google: "Continue with Google",
    apple: "Continue with Apple",
    or: "or",
    magicBtn: "Send magic link",
    terms: 'By continuing, you agree to PoolPlus\'s <a href="#">Terms</a> and <a href="#">Privacy Policy</a>.',
    sending: "Redirecting...",
    magicSent: "Magic link sent! Check your inbox.",
    emptyEmail: "Please enter your email address."
  },
  es: {
    title: "Bienvenido a PoolPlus",
    subtitle: "Inicia sesión para gestionar tu servicio",
    google: "Continuar con Google",
    apple: "Continuar con Apple",
    or: "o",
    magicBtn: "Enviar enlace mágico",
    terms: 'Al continuar, aceptas los <a href="#">Términos</a> y la <a href="#">Política de Privacidad</a> de PoolPlus.',
    sending: "Redirigiendo...",
    magicSent: "¡Enlace enviado! Revisa tu correo.",
    emptyEmail: "Por favor ingresa tu correo electrónico."
  }
};

let currentLang = 'en';

function setLang(lang) {
  currentLang = lang;
  document.getElementById('lang-en').classList.toggle('active', lang === 'en');
  document.getElementById('lang-es').classList.toggle('active', lang === 'es');
  const t = translations[lang];
  document.getElementById('t-title').textContent = t.title;
  document.getElementById('t-subtitle').textContent = t.subtitle;
  document.getElementById('t-google').textContent = t.google;
  document.getElementById('t-apple').textContent = t.apple;
  document.getElementById('t-or').textContent = t.or;
  document.getElementById('t-magic-btn').textContent = t.magicBtn;
  document.getElementById('t-terms').innerHTML = t.terms;
}

function authWith(provider) {
  const msg = document.getElementById('status-msg');
  msg.style.display = 'block';
  msg.style.background = '#1a73e818';
  msg.style.color = '#6cb2ff';
  msg.textContent = translations[currentLang].sending;
  // TODO: connect to real auth (Supabase) — Google / Apple OAuth
  setTimeout(function () {
    window.location.href = 'https://poolplus.app/portal';
  }, 700);
}

function sendMagicLink() {
  const email = document.getElementById('magic-email').value.trim();
  const msg = document.getElementById('status-msg');
  msg.style.display = 'block';

  if (!email) {
    msg.style.background = '#f2898918';
    msg.style.color = '#f28b82';
    msg.textContent = translations[currentLang].emptyEmail;
    return;
  }

  // TODO: connect to real auth (Supabase) — magic link email
  msg.style.background = '#81c99518';
  msg.style.color = '#81c995';
  msg.textContent = translations[currentLang].magicSent;
}
</script>
</body>
</html>
